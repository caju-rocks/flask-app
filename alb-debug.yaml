apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    alb.ingress.kubernetes.io/group.name: bluecharm
    alb.ingress.kubernetes.io/group.order: "20"
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:707791003225:certificate/188cf5ee-ec30-4a16-9fbc-8b5b726735cb"
  labels:
  name: alb-debug
  namespace: test
spec:
  ingressClassName: alb
  rules:
  - host: alb-debug.qa.liverpool.bluecharm.cloud
    http:
      paths:
      - backend:
          service:
            name: debug-svc
            port:
              number: 80
        path: /
        pathType: Prefix
  - host: debug.qa.liverpool.bluecharm.cloud
    http:
      paths:
      - backend:
          service:
            name: debug-svc
            port:
              number: 80
        path: /
        pathType: Prefix
